{% extends 'base.html' %}

{% block content %}
<div class="card shadow-lg border-0 bg-white text-dark">
    <div class="card-header bg-body-tertiary text-dark border-bottom border-2">
        <h5 class="mb-0 fw-semibold">Editar Producto del Pedido</h5>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    
                    {% if field.help_text %}
                        <div class="form-text">{{ field.help_text }}</div>
                    {% endif %}

                    {% for error in field.errors %}
                        <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}

            <div class="d-flex justify-content-between">
                <button type="button" class="btn btn-danger w-100" onclick="confirmarGuardar()">
                    Guardar cambios
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function confirmarGuardar() {
    Swal.fire({
        title: '¿Guardar cambios?',
        text: 'Se actualizará la cantidad del producto en el pedido.',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#2B2B2B',
        cancelButtonColor: '#D8CFC4',
        confirmButtonText: 'Sí, guardar',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            document.querySelector('form').submit();
        }
    });
}
</script>
{% endblock %}
