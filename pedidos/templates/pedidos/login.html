<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Sistema de Pedidos</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body class="bg-light">

{% block content %}

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5 bg-body-secondary rounded-4">
                    <div class="text-center mb-3">
                        <div class="d-inline-flex align-items-center justify-content-center border rounded-4 bg-body" style="width: 64px; height: 64px;">
                            <i class="bi bi-kanban fs-4 text-dark"></i>
                        </div>
                        <h1 class="h3 fw-bold mt-3 mb-1 text-dark">SISTEMA PEDIDOS</h1>
                        <p class="text-secondary mb-0">Inicia sesion para continuar</p>
                    </div>

                    <div class="d-grid gap-2 d-sm-flex mb-3">
                        <button type="button" id="btn-login" class="btn btn-dark flex-fill">Login</button>
                        <button type="button" id="btn-register" class="btn btn-outline-secondary flex-fill">Registro</button>
                    </div>

                    <div id="panel-formularios">
                        <div id="form-login" class="d-none">
                            <form method="post" action="{% url 'login' %}">
                                {% csrf_token %}

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Usuario</label>
                                    <input type="text"
                                           name="username"
                                           class="form-control"
                                           placeholder="Tu usuario"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Contrasena</label>
                                    <input type="password"
                                           name="password"
                                           class="form-control"
                                           placeholder="Minimo 6 caracteres"
                                           required>
                                </div>

                                {% if next %}
                                    <input type="hidden" name="next" value="{{ next }}">
                                {% endif %}

                                {% if error %}
                                <div class="alert alert-danger py-2" role="alert">
                                    {{ error }}
                                </div>
                                {% endif %}

                                <button type="submit" class="btn btn-dark w-100">Entrar</button>
                            </form>
                        </div>

                        <div id="form-register" class="d-none">
                            <form method="post" action="{% url 'register' %}">
                                {% csrf_token %}

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Usuario</label>
                                    <input type="text"
                                           name="username"
                                           class="form-control"
                                           value="{{ username|default:'' }}"
                                           placeholder="Minimo 3 caracteres"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Correo</label>
                                    <input type="email"
                                           name="email"
                                           class="form-control"
                                           value="{{ email|default:'' }}"
                                           placeholder="correo@dominio.com"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Contrasena</label>
                                    <input type="password"
                                           name="password"
                                           class="form-control"
                                           placeholder="Minimo 6 caracteres"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Confirmar contrasena</label>
                                    <input type="password"
                                           name="confirm_password"
                                           class="form-control"
                                           placeholder="Repite la contrasena"
                                           required>
                                </div>

                                {% if errors %}
                                    <div class="alert alert-danger py-2" role="alert">
                                        <ul class="mb-0">
                                            {% for err in errors %}
                                                <li>{{ err }}</li>
                                            {% endfor %}
                                        </ul>
                                    </div>
                                {% endif %}

                                <button type="submit" class="btn btn-dark w-100">Crear cuenta</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function mostrarFormulario(tipo) {
        const btnLogin = document.getElementById('btn-login');
        const btnRegister = document.getElementById('btn-register');
        const formLogin = document.getElementById('form-login');
        const formRegister = document.getElementById('form-register');
        const panel = document.getElementById('panel-formularios');

        if (tipo === 'register') {
            btnRegister.classList.remove('btn-outline-secondary');
            btnRegister.classList.add('btn-dark');
            btnLogin.classList.remove('btn-dark');
            btnLogin.classList.add('btn-outline-secondary');
            formRegister.classList.remove('d-none');
            formLogin.classList.add('d-none');
        } else {
            btnLogin.classList.remove('btn-outline-secondary');
            btnLogin.classList.add('btn-dark');
            btnRegister.classList.remove('btn-dark');
            btnRegister.classList.add('btn-outline-secondary');
            formLogin.classList.remove('d-none');
            formRegister.classList.add('d-none');
        }

        const altoLogin = formLogin.scrollHeight;
        const altoRegistro = formRegister.scrollHeight;
        panel.style.minHeight = Math.max(altoLogin, altoRegistro) + 'px';
    }

    document.getElementById('btn-login').addEventListener('click', function () {
        mostrarFormulario('login');
    });

    document.getElementById('btn-register').addEventListener('click', function () {
        mostrarFormulario('register');
    });

    window.addEventListener('load', function () {
        mostrarFormulario('{{ active_form|default:"login" }}');
    });
</script>

{% endblock %}
</body>
</html>
