<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Sistema de Pedidos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --ed-cream: #F5EFE6;
            --ed-beige: #D8CFC4;
            --ed-ink: #2B2B2B;
            --ed-coral: #FF3B30;
            --ed-wine: #7E1F1F;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--ed-ink);
            background-color: var(--ed-cream) !important;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 59, 48, 0.16) 0, rgba(255, 59, 48, 0) 34%),
                radial-gradient(circle at 92% 84%, rgba(126, 31, 31, 0.14) 0, rgba(126, 31, 31, 0) 35%),
                repeating-radial-gradient(circle at center, rgba(43, 43, 43, 0.03) 0 1px, transparent 1px 4px);
        }

        .card-editorial {
            background: #fff;
            border: 1px solid rgba(43, 43, 43, 0.15);
            box-shadow: 0 14px 28px rgba(43, 43, 43, 0.16);
        }

        .card-editorial .card-body {
            background: linear-gradient(180deg, #faf5ee 0%, #f1e7da 100%);
        }

        .titulo-editorial {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.08em;
            text-shadow: 2px 2px 0 rgba(255, 59, 48, 0.14);
        }

        .btn-danger {
            background-color: var(--ed-coral);
            border-color: var(--ed-coral);
            box-shadow: 3px 3px 0 var(--ed-wine);
        }

        .btn-danger:hover {
            background-color: #e63228;
            border-color: #e63228;
        }
    </style>

</head>
<body class="bg-light">

{% block content %}

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
            <div class="card border-0 rounded-4 text-dark card-editorial">
                <div class="card-body p-4 p-md-5 rounded-4 text-dark">
                    <div class="text-center mb-3">
                        <div class="d-inline-flex align-items-center justify-content-center border rounded-4 bg-body" style="width: 64px; height: 64px;">
                            <i class="bi bi-kanban fs-4 text-dark"></i>
                        </div>
                        <h1 class="h3 fw-bold mt-3 mb-1 text-dark titulo-editorial">SISTEMA PEDIDOS</h1>
                        <p class="text-dark mb-0">Inicia sesion para continuar</p>
                    </div>

                    <div class="d-grid gap-2 d-sm-flex mb-3">
                        <button type="button" id="btn-login" class="btn btn-danger flex-fill">Login</button>
                        <button type="button" id="btn-register" class="btn btn-outline-dark flex-fill">Registro</button>
                    </div>

                    <div id="panel-formularios">
                        <div id="form-login" class="d-none">
                            <form method="post" action="{% url 'login' %}">
                                {% csrf_token %}

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Usuario</label>
                                    <input type="text"
                                           name="username"
                                           class="form-control"
                                           placeholder="Tu usuario"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Contrasena</label>
                                    <input type="password"
                                           name="password"
                                           class="form-control"
                                           placeholder="Minimo 6 caracteres"
                                           required>
                                </div>

                                {% if next %}
                                    <input type="hidden" name="next" value="{{ next }}">
                                {% endif %}

                                {% if error %}
                                <div class="alert alert-warning py-2" role="alert">
                                    {{ error }}
                                </div>
                                {% endif %}

                                <button type="submit" class="btn btn-danger w-100">Entrar</button>
                            </form>
                        </div>

                        <div id="form-register" class="d-none">
                            <form method="post" action="{% url 'register' %}">
                                {% csrf_token %}

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Usuario</label>
                                    <input type="text"
                                           name="username"
                                           class="form-control"
                                           value="{{ username|default:'' }}"
                                           placeholder="Minimo 3 caracteres"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Correo</label>
                                    <input type="email"
                                           name="email"
                                           class="form-control"
                                           value="{{ email|default:'' }}"
                                           placeholder="correo@dominio.com"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Contrasena</label>
                                    <input type="password"
                                           name="password"
                                           class="form-control"
                                           placeholder="Minimo 6 caracteres"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Confirmar contrasena</label>
                                    <input type="password"
                                           name="confirm_password"
                                           class="form-control"
                                           placeholder="Repite la contrasena"
                                           required>
                                </div>

                                {% if errors %}
                                    <div class="alert alert-warning py-2" role="alert">
                                        <ul class="mb-0">
                                            {% for err in errors %}
                                                <li>{{ err }}</li>
                                            {% endfor %}
                                        </ul>
                                    </div>
                                {% endif %}

                                <button type="submit" class="btn btn-danger w-100">Crear cuenta</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function mostrarFormulario(tipo) {
        const btnLogin = document.getElementById('btn-login');
        const btnRegister = document.getElementById('btn-register');
        const formLogin = document.getElementById('form-login');
        const formRegister = document.getElementById('form-register');
        const panel = document.getElementById('panel-formularios');

        if (tipo === 'register') {
            btnRegister.classList.remove('btn-outline-dark');
            btnRegister.classList.add('btn-danger');
            btnLogin.classList.remove('btn-danger');
            btnLogin.classList.add('btn-outline-dark');
            formRegister.classList.remove('d-none');
            formLogin.classList.add('d-none');
        } else {
            btnLogin.classList.remove('btn-outline-dark');
            btnLogin.classList.add('btn-danger');
            btnRegister.classList.remove('btn-danger');
            btnRegister.classList.add('btn-outline-dark');
            formLogin.classList.remove('d-none');
            formRegister.classList.add('d-none');
        }

        const altoLogin = formLogin.scrollHeight;
        const altoRegistro = formRegister.scrollHeight;
        panel.style.minHeight = Math.max(altoLogin, altoRegistro) + 'px';
    }

    document.getElementById('btn-login').addEventListener('click', function () {
        mostrarFormulario('login');
    });

    document.getElementById('btn-register').addEventListener('click', function () {
        mostrarFormulario('register');
    });

    window.addEventListener('load', function () {
        mostrarFormulario('{{ active_form|default:"login" }}');

        const params = new URLSearchParams(window.location.search);
        if (params.get('sesion') === 'seguridad') {
            Swal.fire({
                icon: 'warning',
                title: 'Sesion cerrada por seguridad',
                text: 'Tu sesion expiro o el token no es valido. Inicia sesion nuevamente para continuar.',
                confirmButtonText: 'Entendido'
            });
        }
    });
</script>

{% endblock %}
</body>
</html>
