<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body class="bg-light">

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card shadow-sm border-0" style="width: 100%; max-width: 400px;">

        <!-- HEADER -->
        <div class="card-header bg-white border-bottom text-center">
            <h5 class="mb-0 fw-semibold">Iniciar sesión</h5>
        </div>

        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <!-- USUARIO -->
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" 
                           name="username" 
                           class="form-control"
                           placeholder="Ingrese su usuario"
                           required>
                </div>

                <!-- CONTRASEÑA -->
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" 
                           name="password" 
                           class="form-control"
                           placeholder="Ingrese su contraseña"
                           required>
                </div>

                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <!-- ERROR -->
                {% if error %}
                <div class="text-danger small mb-3">
                    {{ error }}
                </div>
                {% endif %}

                <!-- BOTÓN -->
                <div class="d-grid mb-2">
                    <button type="submit" class="btn btn-dark">
                        Ingresar
                    </button>
                </div>
                <div class="text-center">
                    <a href="{% url 'register' %}">¿No tienes cuenta? Regístrate</a>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
</body>
</html>
