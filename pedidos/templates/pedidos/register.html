<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm border-0" style="width: 100%; max-width: 450px;">
        <div class="card-header bg-white border-bottom text-center">
            <h5 class="mb-0 fw-semibold">Crear cuenta</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" value="{{ username|default:'' }}" class="form-control" placeholder="Nombre de usuario" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" value="{{ email|default:'' }}" class="form-control" placeholder="Correo" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirmar Contraseña</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Repite contraseña" required>
                </div>

                {% if errors %}
                    <div class="alert alert-danger py-2">
                        <ul class="mb-0">
                            {% for err in errors %}
                                <li>{{ err }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                {% endif %}

                <div class="d-grid mb-2">
                    <button type="submit" class="btn btn-dark">Registrar</button>
                </div>
                <div class="text-center">
                    <a href="{% url 'login' %}">Iniciar sesión</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
</body>
</html>
