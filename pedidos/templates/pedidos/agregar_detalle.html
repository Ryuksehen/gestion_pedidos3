{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-white border-bottom">
        <h5 class="mb-0 fw-semibold">Agregar Producto al Pedido #{{ pedido.id }}</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}

                    {% if field.help_text %}
                        <div class="form-text">{{ field.help_text }}</div>
                    {% endif %}

                    {% for error in field.errors %}
                        <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}
            <div class="d-flex justify-content-between align-items-center">
                <a href="/detalle/{{ pedido.id }}" class="text-muted text-decoration-none small icon-hover">
                    ← Volver
                </a>
                <button type="submit" class="btn btn-dark">
                    Agregar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
