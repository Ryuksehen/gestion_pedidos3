{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm border-0">

    <!-- HEADER -->
    <div class="card-header bg-white border-bottom">
        <h5 class="mb-0 fw-semibold">Editar Pedido</h5>
    </div>

    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            <!-- CLIENTE -->
            <div class="mb-3">
                <label class="form-label">Cliente</label>
                {{ form.cliente }}
            </div>

            <!-- FECHA -->
            <div class="mb-3">
                <label class="form-label">Fecha</label>
                {{ form.fecha }}
            </div>

            <!-- ESTADO -->
            <div class="mb-3">
                <label class="form-label">Estado</label>
                {{ form.estado }}
            </div>

            <!-- BOTONES -->
            <div class="d-flex justify-content-between">

                <a href="/" class="text-muted text-decoration-none small icon-hover">
                    ← Volver
                </a>

                <button type="button" class="btn btn-dark" onclick="confirmarGuardar()">
                    Guardar cambios
                </button>

            </div>

        </form>

    </div>

<script>
function confirmarGuardar() {
    Swal.fire({
        title: '¿Guardar cambios?',
        text: 'Se actualizarán los datos del pedido.',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#212529',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Sí, guardar',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            document.querySelector('form').submit();
        }
    });
}
</script>
</div>

{% endblock %}
