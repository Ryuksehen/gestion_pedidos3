<!DOCTYPE html>
<html lang="es">
<head>
    <!-- aqui arrancamos la cabecera base de la pagina -->
    <meta charset="UTF-8">
    <title>Sistema de Pedidos</title>
    
     
    <!-- aqui cargamos iconos para usar en el menu -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- aqui cargamos bootstrap para el estilo general -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- aqui traemos sweetalert para las alertas bonitas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* aqui damos alto fijo a las tarjetas con tablas */
        .fixed-list-card {
            min-height: 680px;
            max-height: 680px;
            display: flex;
            flex-direction: column;
        }
        /* aqui hacemos que el cuerpo ocupe todo el espacio de la tarjeta */
        .fixed-list-card .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow: hidden;
        }
        /* aqui controlamos la zona de tabla para que no se rompa */
        .fixed-list-card .table-responsive {
            flex: 1;
            min-height: 240px;
            max-height: none;
            overflow-y: visible;
        }
        /* aqui evitamos espacio raro debajo de la tabla */
        .fixed-list-card .table-responsive table {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">
    
    <!-- aqui va el menu lateral para moverse por el sistema -->
    <div class="bg-white border-end p-3" style="width: 220px; min-height: 100vh;">
        <h5 class="mb-4">Sistema</h5>
        <ul class="nav flex-column gap-2">
            <li>
                <a href="/" class="nav-link text-dark icon-hover">
                    <i class="bi bi-bag"></i> Pedidos
                </a>
            </li>
            <li>
                <a href="/clientes/" class="nav-link text-dark icon-hover">
                    <i class="bi bi-people"></i> Clientes
                </a>
            </li>
            <li>
                <a href="/productos/" class="nav-link text-dark icon-hover">
                    <i class="bi bi-box"></i> Productos
                </a>
            </li>
            <li>
                <a href="{% url 'listar_detalles' %}" class="nav-link text-dark icon-hover">
                    <i class="bi bi-list-columns"></i> Todos los Detalles
                </a>
            </li>
            <hr>
            <li>
                <a href="#" class="nav-link text-danger" onclick="confirmarLogout(event)">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </a>
            </li>
        </ul>
    </div>
    
    <!-- aqui va el contenido principal de cada vista -->
    <div class="flex-grow-1 p-4">
        
        <!-- aqui dejamos un titulo base del panel -->
        <div class="d-flex justify-content-between mb-4">
            <h4 class="fw-semibold">Panel</h4>
        </div>
        <!-- aqui se pinta el bloque de contenido de cada pagina -->
        {% block content %}
        {% endblock %}
    </div>
</div>
{% if messages %}
<script>
    // aqui mostramos alertas segun el tipo de mensaje
    {% for message in messages %}
        {% if message.tags == "error" %}
            Swal.fire({
                icon: 'error',
                iconColor: '#dc3545',
                title: '{{ message }}',
                confirmButtonText: 'Aceptar'
            });
        {% elif message.tags == "success" %}
            Swal.fire({
                icon: 'success',
                iconColor: '#198754',
                title: '{{ message }}',
                confirmButtonText: 'Aceptar'
            });
        {% else %}
            Swal.fire({
                icon: 'info',
                iconColor: '#0d6efd',
                title: '{{ message }}',
                confirmButtonText: 'Aceptar'
            });
        {% endif %}
    {% endfor %}
</script>
{% endif %}
<script>
// aqui confirmamos si el usuario de verdad quiere salir
function confirmarLogout(event) {
    event.preventDefault();
    Swal.fire({
        title: 'Cerrar sesion',
        text: 'Se cerrara tu sesion actual.',
        icon: 'warning',
        iconColor: '#dc3545',
        showCancelButton: true,
        confirmButtonText: 'Si, salir',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#212529',
        cancelButtonColor: '#6c757d'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = '{% url "logout" %}';
        }
    });
}

// aqui ponemos la fecha de hoy en el campo fecha
function ponerHoy() {
    const inputFecha = document.querySelector('input[name="fecha"]');
    const hoy = new Date();
    const year = hoy.getFullYear();
    const month = String(hoy.getMonth() + 1).padStart(2, '0');
    const day = String(hoy.getDate()).padStart(2, '0');
    inputFecha.value = `${year}-${month}-${day}`;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
