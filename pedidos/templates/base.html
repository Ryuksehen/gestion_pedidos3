<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Pedidos</title>
    <!-- Bootstrap -->
     <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Contenedor de listas con tamaño fijo para uniformidad de UI */
        .fixed-list-card {
            min-height: 680px;
            max-height: 680px;
            display: flex;
            flex-direction: column;
        }
        .fixed-list-card .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow: hidden;
        }
        .fixed-list-card .table-responsive {
            flex: 1;
            min-height: 240px;
            max-height: none; /* Sin límite para que siempre quepa el paginado de 10 filas */
            overflow-y: visible; /* Sin scroll interno */
        }
        .fixed-list-card .table-responsive table {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- SIDEBAR -->
    <div class="bg-white border-end p-3" style="width: 220px; min-height: 100vh;">
        <h5 class="mb-4">Sistema</h5>
        <ul class="nav flex-column gap-2">
            <li>
                <a href="/" class="nav-link text-dark icon-hover">
                    <i class="bi bi-bag"></i> Pedidos
                </a>
            </li>
            <li>
                <a href="/clientes/" class="nav-link text-dark icon-hover">
                    <i class="bi bi-people"></i> Clientes
                </a>
            </li>
            <li>
                <a href="/productos/" class="nav-link text-dark icon-hover">
                    <i class="bi bi-box"></i> Productos
                </a>
            </li>
            <li>
                <a href="{% url 'listar_detalles' %}" class="nav-link text-dark icon-hover">
                    <i class="bi bi-list-columns"></i> Todos los Detalles
                </a>
            </li>
            <hr>
            <li>
                <a href="{% url 'logout' %}" class="nav-link text-danger">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </a>
            </li>
        </ul>
    </div>
    <!-- CONTENIDO -->
    <div class="flex-grow-1 p-4">
        <!-- HEADER -->
        <div class="d-flex justify-content-between mb-4">
            <h4 class="fw-semibold">Panel</h4>
        </div>
        {% block content %}
        {% endblock %}
    </div>
</div>
{% if messages %}
<script>
    {% for message in messages %}
        Swal.fire({
            icon: '{% if message.tags == "error" %}error{% elif message.tags == "success" %}success{% else %}info{% endif %}',
            title: '{{ message }}',
            confirmButtonText: 'Aceptar'
        });
    {% endfor %}
</script>
{% endif %}
<script>
function ponerHoy() {
    const inputFecha = document.querySelector('input[name="fecha"]');
    const hoy = new Date();
    const year = hoy.getFullYear();
    const month = String(hoy.getMonth() + 1).padStart(2, '0');
    const day = String(hoy.getDate()).padStart(2, '0');
    inputFecha.value = `${year}-${month}-${day}`;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
